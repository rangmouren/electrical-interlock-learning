<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>电气控制连锁技术 - 交互式学习平台</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">⚡</div>
    <span class="logo-text">电气控制</span>
    <span style="margin-left:auto;font-size:11px;color:var(--text-muted);background:var(--border);padding:2px 8px;border-radius:10px">v2.0</span>
  </div>
  <div class="nav-section">
    <div class="nav-label">学习路线·15步</div>
    <ul class="nav-list" id="navList"></ul>
  </div>
  <div class="nav-section">
    <div class="nav-label">进度追踪</div>
    <div class="progress-container">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
      <div class="progress-text" id="progressText">0%</div>
    </div>
  </div>
  <div class="sidebar-footer">
    <button class="btn-reset" onclick="App.resetProgress()">🔄 重置进度</button>
  </div>
</nav>

<!-- Main -->
<main class="main-content">
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle">☰</button>
    <h1 id="pageTitle">电气控制连锁技术</h1>
    <div class="topbar-actions">
      <button class="btn-icon" onclick="App._toggleDark()" title="切换主题 (Alt+D)">🌓</button>
      <button class="btn-icon" onclick="App._showHelpToast()" title="快捷键帮助">⌘</button>
    </div>
  </header>
  <div class="content-area" id="contentArea"></div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/pages1.js"></script>
<script src="js/pages2.js"></script>
</body>
</html>
